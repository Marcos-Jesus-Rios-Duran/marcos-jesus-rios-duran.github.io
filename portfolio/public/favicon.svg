<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8FAB"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg2)"/>
  <rect width="100" height="100" rx="22" ry="22"
        fill="none" stroke="#4b96e0" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Texto CD con gradiente rosa → cyan -->
  <text
    x="50" y="67"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="-2"
    fill="url(#textGrad)"
  >CD</text>

  <!-- Línea decorativa abajo -->
  <line x1="28" y1="76" x2="72" y2="76"
        stroke="#4b96e0" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>
</svg>
